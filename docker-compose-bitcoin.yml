services:
  bitcoin:
    build:
      context: .
      dockerfile: Dockerfile.bitcoin
    container_name: bitcoin
    volumes:
      - ./bitcoin:/home/bitcoin/.bitcoin
    ports:
      - ${RPC_PORT}:8332
      - ${P2P_PORT}:8333
      - ${ZMQ_RAWBLOCK_PORT}:28332
      - ${ZMQ_RAWTX_PORT}:28333
      - ${ZMQ_HASHBLOCK_PORT}:28334
    command:
      [
        "./bitcoind",
        "-printtoconsole",
        "-server=1",
        "-listen=1",
        "-txindex=1",
        "-dbcache=3000",
        "-rpcbind=0.0.0.0",
        "-rpcallowip=0.0.0.0/0",
        "-rpcauth=${RPC_AUTH}",
        "-rpcworkqueue=1024",
        "-rpcthreads=16",
        "-rpcservertimeout=900",
        "-zmqpubrawblock=tcp://0.0.0.0:28332",
        "-zmqpubrawtx=tcp://0.0.0.0:28333",
        "-zmqpubhashblock=tcp://0.0.0.0:28334",
      ]
